- name: create system user roboshop
  ansible.builtin.user:
    name: roboshop
    system: true
    home: /app
    shell: /sbin/nologin
    comment: "roboshop system user"

- name: delete a app DIR
  ansible.builtin.file:
    path: /app
    state: absent

- name: Create a app DIR
  ansible.builtin.file:
    path: /app
    state: directory

- name: delete {{ component }} code
  ansible.builtin.file:
    path: /tmp/catalogue.zip
    state: absent
  
- name: Download {{ component }} code
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip 
    dest: /tmp/{{ component }}.zip
  
- name: Unarchive {{ component }}.zip
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes